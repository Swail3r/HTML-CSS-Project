<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h2 class="logo">My Portfolio</h2>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-section contact-section">
            <h1>Contact Me</h1>
            <p>If you have a question or want to work together, please fill out the form below.</p>

            <form action="#" method="post">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">

                <label for="service">Service Needed:</label>
                <select id="service" name="service">
                    <option value="">Select a service</option>
                    <option value="web-design">Web Design</option>
                    <option value="graphic-design">Graphic Design</option>
                    <option value="consultation">Consultation</option>
                </select>

                <label for="message">Additional Information:</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell me more about your project"></textarea>

                <button type="submit">Submit Form</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Siwaphiwe Portfolio. All rights reserved.</p>
    </footer>
</body>
</html>
